version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "11:00"
  open-pull-requests-limit: 10
  cooldown:
    default-days: 7
  labels:
  - dependencies
  groups:
    minor-and-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "11:00"
  open-pull-requests-limit: 10
  cooldown:
    default-days: 7
  labels:
  - dependencies
  groups:
    minor-and-patch:
      update-types:
      - minor
      - patch
